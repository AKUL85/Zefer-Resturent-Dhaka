services:
  - type: web
    name: zephyr-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        scope: run
      - key: DB_PORT
        scope: run
      - key: DB_NAME
        scope: run
      - key: DB_USER
        scope: run
      - key: DB_PASSWORD
        scope: run
      - key: JWT_SECRET
        scope: run
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        scope: run
